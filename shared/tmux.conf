set -g mouse on

# Prefix: Ctrl+a statt Ctrl+b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splits: | und - (im aktuellen Pfad)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Neues Fenster im aktuellen Pfad
bind c new-window -c "#{pane_current_path}"

# Pane-Wechsel mit Alt+Pfeiltasten (ohne Prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Fenster bei 1 beginnen, automatisch umnummerieren
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Scrollback-Buffer
set -g history-limit 50000

# Kein Escape-Delay (wichtig fuer vim/nano)
set -sg escape-time 0

# Pane-Rahmen
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39,bold"

# --- Statusleiste ---
set -g status-style "bg=colour235,fg=colour248"

# Trennzeichen zwischen Fenstern
set -g window-status-separator " | "

# Inaktive Fenster: dezent
set -g window-status-format " #I:#W "
set -g window-status-style "bg=colour235,fg=colour244"

# Aktives Fenster: hervorgehoben
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=colour39,fg=colour232,bold"

# Links: Session-Name
set -g status-left "#[bg=colour214,fg=colour232,bold] #S #[default] "
set -g status-left-length 20

# Rechts: Hostname + Uhrzeit
set -g status-right " #[fg=colour39]#H #[default]| %H:%M "

# Config neu laden mit Prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config neu geladen!"
